name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

env:
  STAGING_APP: blog-staging-api
  STAGING_RG: rg-blog-staging
  STAGING_LOCATION: canadacentral
  PROD_APP: blog-production-api
  PROD_RG: rg-blog-production
  DOTNET_VERSION: '8.0.x'

jobs:
  # ──────────────────────────────────────────
  # Deploy to Staging — runs after CI passes on master
  # ──────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment:
      name: staging
      url: https://${{ env.STAGING_APP }}.azurewebsites.net

    steps:
      # Re-build on workflow_dispatch (no artifact from CI run)
      - uses: actions/checkout@v4
        if: github.event_name == 'workflow_dispatch'

      - name: Setup .NET
        if: github.event_name == 'workflow_dispatch'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build & Publish
        if: github.event_name == 'workflow_dispatch'
        run: |
          dotnet restore
          dotnet publish src/Blog.Api -c Release -o ./publish

      # Download artifact produced by CI run
      - name: Download CI artifact
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: blog-publish
          path: ./publish
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Staging
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.STAGING_APP }}
          package: ./publish

      - name: Wait for app start
        run: sleep 20

      - name: Health check
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            https://${{ env.STAGING_APP }}.azurewebsites.net/health)
          echo "Health status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed"
            exit 1
          fi

  # ──────────────────────────────────────────
  # Deploy to Production — manual trigger only
  # Run via: gh workflow run deploy.yml -f environment=production
  # ──────────────────────────────────────────
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    environment:
      name: production
      url: https://${{ env.PROD_APP }}.azurewebsites.net

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build & Publish
        run: |
          dotnet restore
          dotnet publish src/Blog.Api -c Release -o ./publish

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Production
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.PROD_APP }}
          package: ./publish

      - name: Wait for app start
        run: sleep 20

      - name: Health check
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            https://${{ env.PROD_APP }}.azurewebsites.net/health/ready)
          echo "Health status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Production health check failed"
            exit 1
          fi
